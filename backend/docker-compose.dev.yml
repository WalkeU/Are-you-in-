# Explicit projektnév + konténernevek, hogy a Docker Desktop/`docker ps` alapján
# egyértelműen megkülönböztethető legyen egy másik, esetleg szintén "backend"
# nevű mappában futó, teljesen független projekttől ezen a gépen.
name: areyouin-dev

services:
  db:
    container_name: areyouin-db-dev
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-areyouin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-areyouin}
    volumes:
      - db-data-dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-areyouin}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  api:
    container_name: areyouin-api-dev
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-areyouin}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-areyouin}?schema=public
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-30d}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-120}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - .:/app
      - api-node-modules:/app/node_modules
    ports:
      - "3000:3000"
    tty: true
    stdin_open: true

volumes:
  # Pinned to their existing physical names (from before the project rename) so the
  # dev DB/node_modules keep being reused instead of starting from fresh ones, and
  # marked external so `docker compose down -v` can never delete them by accident.
  db-data-dev:
    name: backend_db-data-dev
    external: true
  api-node-modules:
    name: backend_api-node-modules
    external: true